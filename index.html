<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard - AquaDash</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container-fluid p-4">

        <div class="dashboard-header mb-4 d-flex justify-content-between align-items-center">

            <h2>AquaDash UI</h2>

            <button class="btn btn-success" id="addCardBtn">Add New Widget</button>

        </div>

        <div class="row g-3 mb-4">

            <div class="col-md-3">

                <div class="card stats-card p-3">

                    <div class="d-flex justify-content-between">

                        <div>

                            <h6 class="text-muted">Daily Visits</h6>

                            <h3 class="card-value">25,300</h3>

                            <small class="text-muted">2 Completed</small>

                        </div>

                        <div class="text-primary fs-2">👁️</div>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card stats-card p-3">

                    <div class="d-flex justify-content-between">

                        <div>

                            <h6 class="text-muted">New Users</h6>

                            <h3 class="card-value">128</h3>

                            <small class="text-muted">28 Completed</small>

                        </div>

                        <div class="text-success fs-2">👥</div>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card stats-card p-3">

                    <div class="d-flex justify-content-between">

                        <div>

                            <h6 class="text-muted">Sales</h6>

                            <h3 class="card-value">1,128</h3>

                            <small class="text-muted">1 Low</small>

                        </div>

                        <div class="text-warning fs-2">💰</div>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card stats-card p-3">

                    <div class="d-flex justify-content-between">

                        <div>

                            <h6 class="text-muted">Support Tickets</h6>

                            <h3 class="card-value">5,870</h3>

                            <small class="text-muted">5% Completed</small>

                        </div>

                        <div class="text-info fs-2">❓</div>

                    </div>

                </div>

            </div>

        </div>

        <div class="card table-card p-3">

            <div class="d-flex justify-content-between align-items-center mb-3">

                <h5>Recent Transactions</h5>

                <button class="btn btn-primary btn-sm" id="updateBtn">Update Data</button>

            </div>

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead>

                        <tr>

                            <th scope="col">PROJECT NAME</th>

                            <th scope="col">HOURS</th>

                            <th scope="col">PRIORITY</th>

                            <th scope="col">PROGRESS</th>

                        </tr>

                    </thead>

                    <tbody id="table-body">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="script.js"></script>

</body>

</html>
